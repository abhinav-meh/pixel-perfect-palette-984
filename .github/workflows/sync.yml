name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Sync fork
        uses: tgymnich/fork-sync@v2
        with:
          owner: abhinav-meh
          base: main
          head: main
          repo: pixel-perfect-palette-984
          token: ${{ secrets.GITHUB_TOKEN }}
